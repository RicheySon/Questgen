<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuestGen - Smart Question Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app-bg"></div>
  <main class="container">
    <header class="hero">
      <div class="logo">QG</div>
      <div class="hero-text">
        <h1>QuestGen</h1>
        <p class="tagline">A smart, adaptive quiz generator across every topic worth knowing.</p>
      </div>
      {% if user %}
      <div class="auth-nav">
        <span class="auth-hi">Hi, {{ user.username }}</span>
        <a href="/logout" class="btn btn-ghost btn-sm">Log out</a>
      </div>
      {% endif %}
    </header>

    {% block content %}{% endblock %}

    <footer class="foot">Built by Rejoice Akosua Dzanku</footer>
  </main>
</body>
</html>
