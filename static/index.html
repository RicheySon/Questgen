<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuestGen - Smart Question Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app-bg"></div>
  <main class="container">
    <header class="hero">
      <div class="logo">QG</div>
      <div class="hero-text">
        <h1>QuestGen</h1>
        <p class="tagline">A smart, adaptive quiz generator across every topic worth knowing.</p>
      </div>
      <!--USER_NAV-->
    </header>

    <section class="card screen">
      <h2 class="card-title">Build your quiz</h2>
      <p class="card-sub">Pick a category, choose your style, and we&rsquo;ll handle the rest.</p>

      <!--ERROR-->

      <form class="form-grid" action="/generate" method="post">
        <label class="field">
          <span>Category</span>
          <select name="subject">
            <option value="general">General Knowledge</option>
            <option value="science">Science &amp; Nature</option>
            <option value="physics">Physics</option>
            <option value="chemistry">Chemistry</option>
            <option value="biology">Biology</option>
            <option value="health">Health &amp; Medicine</option>
            <option value="technology">Technology</option>
            <option value="ai">Artificial Intelligence</option>
            <option value="mathematics">Mathematics</option>
            <option value="history">History</option>
            <option value="geography">Geography</option>
            <option value="space">Space &amp; Astronomy</option>
            <option value="literature">Literature</option>
            <option value="music">Music</option>
            <option value="sports">Sports</option>
            <option value="art">Art</option>
            <option value="economics">Economics</option>
          </select>
        </label>

        <label class="field">
          <span>Focus Topic (optional)</span>
          <input type="text" name="focus_topic" placeholder="e.g. Algebra, World War II, Basketball" autocomplete="off" />
          <small class="hint">Narrows questions to a specific topic within the category.</small>
        </label>

        <label class="field">
          <span>Number of Questions</span>
          <input type="number" name="total_questions" min="1" max="30" value="8" />
        </label>

        <label class="field">
          <span>Difficulty Level</span>
          <select name="difficulty">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
            <option value="advanced">Advanced</option>
          </select>
          <small class="hint">Locks the entire quiz at this difficulty level.</small>
        </label>

        <fieldset class="field types">
          <legend>Question Types (mix and match)</legend>
          <label class="check"><input type="checkbox" name="multiple_choice" value="1" checked /> <span>Multiple Choice</span></label>
          <label class="check"><input type="checkbox" name="short_answer" value="1" checked /> <span>Short Answer</span></label>
          <label class="check"><input type="checkbox" name="true_false" value="1" checked /> <span>True / False</span></label>
        </fieldset>

        <button type="submit" class="btn btn-primary btn-block">Generate Quiz</button>
      </form>
    </section>

    <!--RESULTS-->

    <footer class="foot">Built by Rejoice Akosua Dzanku</footer>
  </main>
</body>
</html>
